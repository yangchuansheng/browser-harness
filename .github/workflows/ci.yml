name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Test Rust Workspace
        run: cargo test --workspace --manifest-path rust/Cargo.toml

      - name: Test Python Compatibility Contract
        run: python -m unittest tests/test_rust_mode_contract.py

      - name: Byte-Compile Python Files
        run: python -m py_compile run.py helpers.py admin.py admin_cli.py runner_cli.py tests/test_rust_mode_contract.py scripts/*.py

      - name: Install Package
        run: python -m pip install -e .

      - name: Check CLI Entry Points
        run: |
          browser-harness --help
          browser-harness summary
          bhctl daemon-alive
          bhrun summary
