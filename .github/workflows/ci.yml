name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Ensure Ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Scan Sensitive Content
        run: ./scripts/scan_sensitive.sh

      - name: Set Up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> rust/target

      - name: Test Rust Workspace
        run: cargo test --workspace --manifest-path rust/Cargo.toml

      - name: Install Rust CLI Binaries
        run: cargo run --quiet --manifest-path rust/Cargo.toml --bin browser-harness -- install --root "${RUNNER_TEMP}/browser-harness"

      - name: Add Installed Binaries To PATH
        run: echo "${RUNNER_TEMP}/browser-harness/bin" >> "$GITHUB_PATH"

      - name: Check CLI Entry Points
        run: |
          browser-harness --help
          browser-harness summary
          bhctl daemon-alive
          bhrun summary

      - name: Verify Installed Rust-Only Package Surface
        run: browser-harness verify-install --install-root "${RUNNER_TEMP}/browser-harness"
